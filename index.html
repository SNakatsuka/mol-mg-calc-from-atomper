<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>XPS Atomic% → wt% / mg / mol Calculator</title>
<style>
body { font-family: sans-serif; margin: 40px; }
table, th, td { border: 1px solid #aaa; border-collapse: collapse; padding: 6px; }
button { margin-top: 10px; padding: 6px 12px; }
input { width: 90px; }
</style>
</head>
<body>

<h2>XPS Atomic% → wt% / mg / mol Calculator</h2>

<p>任意の元素を追加して atomic% を入力してください：</p>

<table id="elemTable">
<thead>
<tr><th>元素</th><th>atomic%</th></tr>
</thead>
<tbody>
<tr><td><input placeholder="C" /></td><td><input placeholder="74.38" /></td></tr>
<tr><td><input placeholder="N" /></td><td><input placeholder="8.22" /></td></tr>
<tr><td><input placeholder="O" /></td><td><input placeholder="15.48" /></td></tr>
<tr><td><input placeholder="Pd" /></td><td><input placeholder="1.29" /></td></tr>
<tr><td><input placeholder="F" /></td><td><input placeholder="0.63" /></td></tr>
</tbody>
</table>

<button onclick="addRow()">＋ 元素を追加</button><br><br>

<label>試料質量 (mg)：<input id="sampleMass" type="number" value="10"></label><br><br>

<button onclick="calculate()">計算する</button>
<button onclick="downloadCSV()">CSV ダウンロード</button>
<button onclick="downloadExcel()">Excel ダウンロード（.xlsx）</button>

<h3>結果</h3>
<pre id="result"></pre>

<script type="module">

/* ===========================
   atomicWeights.js モジュール
   =========================== */
export const atomicWeights = {
 H:1.008, He:4.0026, Li:6.94, Be:9.0122, B:10.81, C:12.011, N:14.007, O:15.999, F:18.998, Ne:20.180,
 Na:22.990, Mg:24.305, Al:26.982, Si:28.085, P:30.974, S:32.06, Cl:35.45, Ar:39.948,
 K:39.098, Ca:40.078, Sc:44.956, Ti:47.867, V:50.942, Cr:51.996, Mn:54.938, Fe:55.845,
 Co:58.933, Ni:58.693, Cu:63.546, Zn:65.38, Ga:69.723, Ge:72.630, As:74.922, Se:78.971,
 Br:79.904, Kr:83.798, Rb:85.468, Sr:87.62, Y:88.906, Zr:91.224, Nb:92.906, Mo:95.95,
 Tc:98, Ru:101.07, Rh:102.91, Pd:106.42, Ag:107.87, Cd:112.41, In:114.82, Sn:118.71,
 Sb:121.76, Te:127.60, I:126.90, Xe:131.29,
 Cs:132.91, Ba:137.33, La:138.91, Ce:140.12, Pr:140.91, Nd:144.24,
 Pm:145, Sm:150.36, Eu:151.96, Gd:157.25, Tb:158.93, Dy:162.50, Ho:164.93,
 Er:167.26, Tm:168.93, Yb:173.05, Lu:174.97,
 Hf:178.49, Ta:180.95, W:183.84, Re:186.21, Os:190.23, Ir:192.22, Pt:195.08,
 Au:196.97, Hg:200.59, Tl:204.38, Pb:207.2, Bi:208.98,
 Po:209, At:210, Rn:222,
 Fr:223, Ra:226, Ac:227, Th:232.04, Pa:231.04, U:238.03,
 Np:237, Pu:244, Am:243, Cm:247, Bk:247, Cf:251, Es:252, Fm:257,
 Md:258, No:259, Lr:266, Rf:267, Db:268, Sg:269, Bh:270, Hs:277,
 Mt:278, Ds:281, Rg:282, Cn:285, Nh:286, Fl:289, Mc:290, Lv:293, Ts:294, Og:294
};

/* ===========================
   logic.js モジュール
   =========================== */
export function computeResults(comps, sampleMass, atomicWeights) {
  let sumAtomic = comps.reduce((s,c)=>s+c.atomic,0);
  if (Math.abs(sumAtomic - 100) > 0.01) {
    throw new Error(`atomic% の合計が 100% ではありません（現在 ${sumAtomic.toFixed(4)}%）`);
  }

  let totalMass = 0;
  let partial = [];

  for (let c of comps) {
    const aw = atomicWeights[c.element];
    if (!aw) throw new Error(`未知の元素：${c.element}`);
    const w = (c.atomic/100) * aw;
    partial.push({...c, aw:aw, weight:w});
    totalMass += w;
  }

  let results = partial.map(p => {
    const wt = (p.weight / totalMass) * 100;
    const mg = sampleMass * (wt/100);
    const mol = (mg/1000) / p.aw;
    return {element:p.element, wt, mg, mol};
  });

  return results;
}

/* ===========================
   ui.js メイン処理
   =========================== */
import {atomicWeights as AW} from "./index.html";
import {computeResults} from "./index.html";

window.addRow = function() {
  const table = document.querySelector("#elemTable tbody");
  const tr = document.createElement("tr");
  tr.innerHTML = `<td><input placeholder="Element" /></td>
                  <td><input placeholder="0.0" /></td>`;
  table.appendChild(tr);
};

window.calculate = function() {
  try {
    const rows = document.querySelectorAll("#elemTable tbody tr");
    let comps = [];
    rows.forEach(r => {
      const elem = r.children[0].querySelector("input").value.trim();
      const atp  = parseFloat(r.children[1].querySelector("input").value);
      if (elem && !isNaN(atp)) comps.push({element:elem, atomic:atp});
    });

    const sampleMass = parseFloat(document.getElementById("sampleMass").value);

    const results = computeResults(comps, sampleMass, AW);

    let out = "";
    results.forEach(r => {
      out += `${r.element}:\n`;
      out += `  wt% = ${r.wt.toFixed(4)}\n`;
      out += `  in ${sampleMass} mg → ${r.mg.toFixed(4)} mg\n`;
      out += `  mol = ${r.mol.toExponential(6)} mol\n\n`;
    });

    document.getElementById("result").textContent = out;

    window._lastResults = results;  // CSV/Excel 出力用

  } catch(e) { alert(e.message); }
};

window.downloadCSV = function() {
  if (!window._lastResults) return alert("先に計算してください");

  let csv = "Element,wt%,mg,mol\n";
  window._lastResults.forEach(r=>{
    csv += `${r.element},${r.wt},${r.mg},${r.mol}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "xps_result.csv";
  a.click();
};

window.downloadExcel = function() {
  if (!window._lastResults) return alert("先に計算してください");

  // Excel は CSV を .xlsx 拡張子で読んでくれる
  let csv = "Element,wt%,mg,mol\n";
  window._lastResults.forEach(r=>{
    csv += `${r.element},${r.wt},${r.mg},${r.mol}\n`;
  });

  const blob = new Blob([csv], {type:"application/vnd.ms-excel"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "xps_result.xlsx";
  a.click();
};

</script>

</body>
</html>
